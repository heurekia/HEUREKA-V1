name: CI

on:
  # CI uniquement sur les PR : le run `pull_request` teste déjà l'arbre FUSIONNÉ
  # (GitHub checkout `refs/pull/N/merge`). On a retiré le trigger `push` sur main
  # qui relançait un 2e run CI redondant après chaque merge (≈ -50% de runs CI).
  # Pour que « commit mergé == commit testé », activer en protection de branche :
  # « Require branches to be up to date before merging ». Le déploiement, lui,
  # reste déclenché sur push main via deploy.yml.
  pull_request:
    branches: [main]

# Annule un run en cours devenu obsolète quand on repousse sur la même PR,
# au lieu de le laisser tourner jusqu'au bout (le deploy a déjà ce mécanisme).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: Security audit (prod deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        # --prod excludes devDependencies (drizzle-kit esbuild vulns are dev-only)
        run: pnpm audit --prod

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: cd apps/api && npx tsc --noEmit

      - name: Typecheck web
        run: cd apps/web && npx tsc --noEmit

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test API
        run: cd apps/api && pnpm test

  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: cd apps/web && npx vite build

      - name: Build API
        run: cd apps/api && npx tsc
